<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <title>Document</title>
</head>
<body>
   <div class="mt-4">

    <label for="max-price">Max Price: </label>
    <input type="number" id="max-price" class="border-2 border-solid border-gray-300">
    <label for="search-term">Search Term: </label>
    <input type="text" id="search-tera" class="border-2 border-solid border-gray-300">
    <span class="sort-asc p-2 bg-gray-200 cursor-pointer">ASC</span>
    <span class="sort-desc p-2 bg-gray-200 cursor-pointer">DESC</span>
    </div>

    <div class="cards-grid h-screen flex flex-wrap justify-center items-center gap-5">
        <!-- Cards will be dynamically inserted here -->
    </div>
    <div class="cursor-pointer fixed top-4 right-4 z-10 color-gray-700">
        <button onclick="showCart()" class="checkout p-4 bg-green-200 cursor-pointer">Checkout</button>
        <button onclick="Favorite()" class="checkout p-4 bg-red-200 cursor-pointer">Favorite</button>

    </div>
    <div class="cart hidden absolute h-full w-full top-0 p-20 bg-white"></div>
    <div class="favorite hidden absolute h-full w-full top-0 p-20 bg-white"></div>




    <script>
       let products = [
    { name: 'Camera', price: 50, img: 'image.jpg', id: 'product_1' },
    { name: 'Phone', price: 400, img: 'phone.jpg', id: 'product_2' },
    { name: 'Laptop', price: 899, img: 'laptop.jpg', id: 'product_3' }
        ];
    let cardGrid=document.querySelector('.cards-grid');

      // Function to populate the products grid
      function populateProductsGrid(productsParam) {
        cardGrid.innerHTML = '';
        productsParam.forEach(product => {
            let cardHtml = createHTMLProductCard(product);// Create the HTML for the product card
            cardGrid.innerHTML += cardHtml; // Append the card HTML to the grid
           
        })
      }
       // Function to create HTML for a product card
     function createHTMLProductCard(product) {
        let cardHtml = `
            <div class="card w-52 shadow-md">
            <div class="img-wrapper border h-52 w-52 overflow-hidden">
            <img class="h-full max-w-none" src="${product.img}" alt="" />
            </div>
            <div class="card-details p-2">
            <div class="flex justify-between items-center">
            <h3 class="product-name">${product.name}</h3>
            <i class="fas fa-heart cursor-pointer" onclick="addItemToFavorite('${product.id}')"></i>
            </div>
            <div class="flex justify-between items-center mt-2">
            <div class="price">$${product.price}</div>
            <button onclick="addItemToCart('${product.id}')" class="p-2 bg-blue-200 cursor-pointer">Add to Cart</button>
            

            </div>
            </div>
            </div>
            `; 
                return cardHtml;
        }
            populateProductsGrid(products);
        
            // Function to filter products based on max price and search term
       function filterProducts(products, maxPrice, searchTerm) {
            const price = Number(maxPrice);

            return products
        .filter(product => {
            if (!price || isNaN(price)) return true; // show all if invalid
            return product.price <= price; // correct comparison
        })
        .filter(product => {
            if (!searchTerm) return true;
            return product.name.toLowerCase().includes(searchTerm.toLowerCase());
        });
}
       // Event listeners for input changes
        let maxPriceInput=document.querySelector('#max-price');
        let searchTermInput=document.querySelector('#search-tera');
         
        maxPriceInput.addEventListener('input', function(){
            let filteredProducts=filterProducts(products,maxPriceInput.value,searchTermInput.value);
            populateProductsGrid(filteredProducts);
        });

        searchTermInput.addEventListener('input', function(){
           populateProductsGrid(filterProducts(products,maxPriceInput.value,searchTermInput.value));
        });

        function sortPriceAsc(arrayofItems){
            let sortedArr=arrayofItems.sort(function(prod1,prod2){
                return prod1.price-prod2.price;
            });
            return sortedArr;
        }

        function sortPriceDesc(arrayofItems){
            let sortedArr=arrayofItems.sort(function(prod1,prod2){
                return prod2.price-prod1.price;
            });
            return sortedArr;
        }
        document.querySelector('.sort-asc').addEventListener('click', function(){
            let sortedProducts=sortPriceAsc(products);
            populateProductsGrid(sortedProducts);
        });

        document.querySelector('.sort-desc').addEventListener('click', function(){
            let sortedProducts=sortPriceDesc(products);
            populateProductsGrid(sortedProducts);
        });


    // CART ARRAY
    let cart = [];

    // ADD ITEM TO CART
    function addItemToCart(id) {
        let product = products.find(p => p.id === id);

        let found = cart.find(item => item.id === id);
        if (found) {
            found.qty += 1;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                img: product.img,
                qty: 1
            });
        }
    }

    // SHOW CART
    function showCart() {
        let cartDiv = document.querySelector('.cart');
        cartDiv.classList.remove('hidden');

        let html = `
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Your Cart</h2>
                <span onclick="closeCart()" class="cursor-pointer text-red-500 font-bold text-2xl">X</span>
            </div>
        `;

        if (cart.length === 0) {
            html += "<p>Your cart is empty</p>";
        } else {
            let total = 0;
            cart.forEach((item, index) => {
                html += `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <img src="${item.img}" alt="${item.name}" class="w-12 h-12 object-cover"/>
                            <span>${item.name} x${item.qty}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span>$${item.price * item.qty}</span>
                            <button onclick="removeItem(${index})" class="p-1 bg-red-400 text-white rounded">Remove</button>
                        </div>
                    </div>
                `;
                total += item.price * item.qty;
            });
            html += `<h3 class="mt-4 font-bold">Total: $${total}</h3>`;
        }

        cartDiv.innerHTML = html;
    }

    // REMOVE OR DECREASE ITEM
    function removeItem(index) {
        if (cart[index].qty > 1) {
            cart[index].qty -= 1;  
        } else {
            cart.splice(index, 1); 
        }
        showCart();
    }

    // CLOSE CART
    function closeCart() {
        document.querySelector('.cart').classList.add('hidden');
    }
    
// FAVORITE ARRAY
    let favorite = [];

    // Add item to favorite (no duplicates)
    function addItemToFavorite(id) {
        heart=document.querySelector(`.fa-heart[onclick="addItemToFavorite('${id}')"]`);
        heart.addEventListener('click', function(){
            heart.classList.toggle('text-red-500');
        });
        let product = products.find(p => p.id === id);
        if (!favorite.find(item => item.id === id)) {
            favorite.push(product); // adds to favorites
        }
    }

    // Show favorite items
    function Favorite() {
        let favoriteDiv = document.querySelector('.favorite');
        favoriteDiv.classList.remove('hidden');

        let html = `
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Your Favorite (${favorite.length})</h2>
                <span onclick="closeFavorite()" class="cursor-pointer text-red-500 font-bold text-2xl">X</span>
            </div>
        `;

        if (favorite.length === 0) {
            html += "<p>No Favorite</p>";
        } else {
            favorite.forEach((item, index) => {
                html += `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <img src="${item.img}" alt="${item.name}" class="w-12 h-12 object-cover"/>
                            <span>${item.name}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="removeFavorite(${index})" class="p-1 bg-red-400 text-white rounded">Remove</button>
                        </div>
                    </div>
                `;
            });
        }

        favoriteDiv.innerHTML = html;
    }

    // Close favorite panel
    function closeFavorite() {
        document.querySelector('.favorite').classList.add('hidden');
    }

    // Remove item from favorite
    function removeFavorite(index) {
        favorite.splice(index, 1);
        Favorite(); // Refresh favorite display
    }
    </script>
</body>
</html>
