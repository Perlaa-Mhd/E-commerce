<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<title>Store</title>
</head>
<body class="bg-gray-50">

<!-- HEADER -->
<header class="header flex justify-between items-center p-6 bg-white shadow-md">
    <p class="text-2xl font-bold">Store</p>
    <i id="search-toggle" class="fa-solid fa-magnifying-glass cursor-pointer text-xl"></i>
</header>

<!-- SEARCH & FILTER -->
<div id="store-search" class="hidden flex flex-wrap gap-4 justify-end p-4 bg-white shadow-md">
    <div class="flex items-center gap-2">
        <h3>Sort By:</h3>
        <select id="sort" class="border-2 border-gray-300 p-1">
            <option value="default">Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A to Z</option>
            <option value="name-desc">Name: Z to A</option>
        </select>
    </div>
    <div class="flex items-center gap-2">
        <label for="price-limit">Price Limit:</label>
        <input type="number" id="price-limit" class="border-2 border-gray-300 p-1" placeholder="Enter price">
    </div>
    <div class="flex items-center gap-2">
        <label for="text-input">Search:</label>
        <input type="text" id="text-input" class="border-2 border-gray-300 p-1" placeholder="Enter text">
    </div>
    <p id="store-search-close" class="cursor-pointer text-red-500 font-bold text-xl">X</p>
</div>

<!-- PRODUCTS GRID -->
<section class="cards-grid p-5 flex flex-wrap gap-5 justify-center"></section>

<!-- CART & FAVORITE BUTTONS LOWER -->
<div class="fixed bottom-6 right-6 z-10 flex flex-col gap-2">
    <button onclick="showCart()" class="p-2 bg-green-200 cursor-pointer rounded shadow-md">Checkout</button>
    <button onclick="showFavorite()" class="p-2 bg-red-200 cursor-pointer rounded shadow-md">Favorite</button>
</div>

<!-- CART & FAVORITE PANELS -->
<div class="cart hidden absolute h-full w-full top-0 left-0 p-20 bg-white overflow-auto"></div>
<div class="favorite hidden absolute h-full w-full top-0 left-0 p-20 bg-white overflow-auto"></div>

<script>
    
    let products = [
        { name: 'Camera', price: 50, img: 'images/image.jpg', id: 'product_1' },
        { name: 'Phone', price: 400, img: 'images/phone.jpg', id: 'product_2' },
        { name: 'Laptop', price: 899, img: 'images/laptop.jpg', id: 'product_3' }
    ];

    let cardGrid = document.querySelector('.cards-grid');
    let searchToggle = document.getElementById('search-toggle');
    let searchFilter = document.getElementById('store-search');
    let closeFilter = document.getElementById('store-search-close');

    let searchInput = document.getElementById('text-input');
    let priceInput = document.getElementById('price-limit');
    let sortSelect = document.getElementById('sort');

    let cart = [];
    let favorite = [];

    // Toggle search/filter panel
    searchToggle.addEventListener('click', () => 
    searchFilter.classList.toggle('hidden'));

    closeFilter.addEventListener('click', () => 
    searchFilter.classList.add('hidden'));

    // Populate products grid
    function populateProductsGrid(productsParam) {
        cardGrid.innerHTML = '';
        productsParam.forEach(product => {
            let cardHtml = `
            <div class="card w-52 shadow-md border border-gray-300">
                <div class="img-wrapper h-52 w-52 overflow-hidden border-b border-gray-200">
                    <img class="h-full w-full object-cover" src="${product.img}" alt="${product.name}" />
                </div>
                <div class="p-2">
                    <div class="flex justify-between items-center">
                        <h3 class="product-name">${product.name}</h3>
                        <i class="fas fa-heart cursor-pointer ${favorite.find(f => f.id === product.id) ? 'text-red-500' : ''}" onclick="addItemToFavorite('${product.id}')"></i>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <div class="price">$${product.price}</div>
                        <button onclick="addItemToCart('${product.id}')" class="p-2 bg-blue-200 cursor-pointer rounded">Add to Cart</button>
                    </div>
                </div>
            </div>`;
            cardGrid.innerHTML += cardHtml;
        });
    }
    populateProductsGrid(products);

    // Filter products
    function filterProducts() {
        let searchTerm = searchInput.value.toLowerCase();
        let priceLimit = parseFloat(priceInput.value);
        let filtered = products.filter(p => {
            let nameMatch = p.name.toLowerCase().includes(searchTerm);
            let priceMatch = isNaN(priceLimit) || p.price <= priceLimit;
            return nameMatch && priceMatch;
        });

        const sortBy = sortSelect.value;
        if (sortBy === 'price-asc') filtered.sort((a,b) => a.price-b.price);
        else if (sortBy === 'price-desc') filtered.sort((a,b) => b.price-a.price);
        else if (sortBy === 'name-asc') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortBy === 'name-desc') filtered.sort((a,b) => b.name.localeCompare(a.name));

        populateProductsGrid(filtered);
    }

    searchInput.addEventListener('input', filterProducts);
    priceInput.addEventListener('input', filterProducts);
    sortSelect.addEventListener('change', filterProducts);


    // CART FUNCTIONS
    function addItemToCart(id) {
        let product = products.find(p => p.id === id);
        let found = cart.find(item => item.id === id);
        if(found) found.qty += 1;
        else cart.push({...product, qty:1});
    }

    function showCart() {
        let cartDiv = document.querySelector('.cart');
        cartDiv.classList.remove('hidden');
        let html = `<div class="flex justify-between mb-4"><h2 class="text-xl font-bold">Your Cart</h2><span onclick="closeCart()" class="cursor-pointer text-red-500 font-bold text-2xl">X</span></div>`;
        if(cart.length === 0) html += "<p>Your cart is empty</p>";
        else {
            let total = 0;
            cart.forEach((item,index)=>{
                html += `<div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-2"><img src="${item.img}" class="w-12 h-12 object-cover"/> ${item.name} x${item.qty}</div>
                            <div class="flex items-center gap-2"><span>$${item.price*item.qty}</span><button onclick="removeItem(${index})" class="p-1 bg-red-400 text-white rounded">Remove</button></div>
                        </div>`;
                total += item.price*item.qty;
            });
            html += `<h3 class="mt-4 font-bold">Total: $${total}</h3>`;
        }
        cartDiv.innerHTML = html;
    }

    function removeItem(index) {
        if(cart[index].qty>1) cart[index].qty -= 1;
        else cart.splice(index,1);
        showCart();
    }

    function closeCart() { 
        document.querySelector('.cart').classList.add('hidden'); 
    }

    // FAVORITE FUNCTIONS
    function addItemToFavorite(id) {
        let product = products.find(p => p.id===id);

        let heartIcon = document.querySelector(`.fa-heart[onclick="addItemToFavorite('${id}')"]`);
        heartIcon.classList.toggle('text-red-500');

        if(!favorite.find(f=>f.id===id)) favorite.push(product);
        else favorite = favorite.filter(f=>f.id!==id);
    }

    function showFavorite() {
        let favoriteDiv = document.querySelector('.favorite');
        favoriteDiv.classList.remove('hidden');
        let html = `<div class="flex justify-between mb-4"><h2 class="text-xl font-bold">Your Favorite (${favorite.length})</h2><span onclick="closeFavorite()" class="cursor-pointer text-red-500 font-bold text-2xl">X</span></div>`;
        if(favorite.length===0) html += "<p>No Favorite</p>";
        else favorite.forEach((item,index)=>{
            html += `<div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2"><img src="${item.img}" class="w-12 h-12 object-cover"/> ${item.name}</div>
                        <div><button onclick="removeFavorite(${index})" class="p-1 bg-red-400 text-white rounded">Remove</button></div>
                    </div>`;
        });
        favoriteDiv.innerHTML = html;
    }

    function closeFavorite(){ 
        document.querySelector('.favorite').classList.add('hidden'); 
    }

     function removeFavorite(index){
        favorite.splice(index,1);
        showFavorite();

        populateProductsGrid(products);   
    }
</script>

</body>
</html>
